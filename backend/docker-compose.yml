services:
    acaraki-be:
        build:
            context: ./vendor/laravel/sail/runtimes/8.2
            dockerfile: Dockerfile
            args:
                WWWGROUP: '${WWWGROUP:-1000}'
        image: sail-8.2/app
        extra_hosts:
            - 'host.docker.internal:host-gateway'
        ports:
            - '${APP_PORT:-80}:80'
            - '${VITE_PORT:-5181}:${VITE_PORT:-5181}'
        environment:
            WWWUSER: '${WWWUSER:-1000}'
            LARAVEL_SAIL: 1
            XDEBUG_MODE: '${SAIL_XDEBUG_MODE:-off}'
            XDEBUG_CONFIG: '${SAIL_XDEBUG_CONFIG:-client_host=host.docker.internal}'
            IGNITION_LOCAL_SITES_PATH: '${PWD}'
        volumes:
            - '.:/var/www/html'
        networks:
            - sail
        depends_on:
            - mysql
            - redis

    mysql:
        image: mysql:8.0
        container_name: acaraki-mysql
        restart: unless-stopped
        environment:
            MYSQL_ROOT_PASSWORD: '${DB_PASSWORD}'
            MYSQL_DATABASE: acaraki_db
            MYSQL_USER: acaraki_user
            MYSQL_PASSWORD: '${DB_PASSWORD}'
        ports:
            - '3306:3306'
        volumes:
            - 'sail-mysql:/var/lib/mysql'
            - './docker/backup:/backup'
        networks:
            - sail
        healthcheck:
            test: ["CMD", "mysqladmin", "ping", "-pacaraki_user", "-p${DB_PASSWORD}"]
            retries: 3
            timeout: 5s

    redis:
        image: redis:alpine
        container_name: acaraki-redis
        restart: unless-stopped
        ports:
            - '6379:6379'
        volumes:
            - 'sail-redis:/data'
        networks:
            - sail
        healthcheck:
            test: ["CMD", "redis-cli", "ping"]
            retries: 3
            timeout: 5s

    phpmyadmin:
        image: phpmyadmin/phpmyadmin
        container_name: acaraki-phpmyadmin
        restart: unless-stopped
        ports:
            - '8080:80'
        environment:
            PMA_HOST: mysql
            PMA_PORT: 3306
            PMA_USER: acaraki_user
            PMA_PASSWORD: eGMtQznGqo~2
        networks:
            - sail
        depends_on:
            - mysql

networks:
    sail:
        driver: bridge

volumes:
    sail-mysql:
        driver: local
    sail-redis:
        driver: local
